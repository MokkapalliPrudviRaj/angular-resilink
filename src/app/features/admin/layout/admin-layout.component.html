<div class="flex h-screen bg-gray-50">
  <!-- Desktop Sidebar -->
  <aside 
    [class.w-64]="sidebarOpen"
    [class.w-20]="!sidebarOpen"
    class="hidden lg:flex flex-col bg-white border-r border-gray-200 transition-all duration-300">
    <!-- Logo -->
    <div class="h-16 flex items-center justify-center border-b border-gray-200 px-4">
      <div *ngIf="sidebarOpen" class="flex items-center gap-2">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <mat-icon class="text-white">apartment</mat-icon>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-900">ResiLink</h1>
          <p class="text-xs text-gray-500">Admin Portal</p>
        </div>
      </div>
      <div *ngIf="!sidebarOpen" class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
        <mat-icon class="text-white">apartment</mat-icon>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto">
      <ul class="space-y-2">
        <li *ngFor="let item of navItems">
          <a
            [routerLink]="item.route"
            [class.bg-primary]="isActive(item.route)"
            [class.text-white]="isActive(item.route)"
            [class.text-gray-700]="!isActive(item.route)"
            [class.hover:bg-gray-100]="!isActive(item.route)"
            class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span *ngIf="sidebarOpen" class="font-medium">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Toggle Sidebar Button -->
    <div class="p-3 border-t border-gray-200">
      <button
        (click)="toggleSidebar()"
        class="w-full flex items-center justify-center gap-2 px-3 py-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
        <mat-icon>{{ sidebarOpen ? 'chevron_left' : 'chevron_right' }}</mat-icon>
        <span *ngIf="sidebarOpen" class="text-sm">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-6">
      <!-- Mobile Menu Button -->
      <button
        (click)="toggleMobileMenu()"
        class="lg:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
        <mat-icon>menu</mat-icon>
      </button>

      <div class="flex-1"></div>

      <!-- User Menu -->
      <div class="flex items-center gap-4">
        <div class="hidden sm:block text-right">
          <p class="text-sm font-medium text-gray-900">{{ (authService.user$ | async)?.name }}</p>
          <p class="text-xs text-gray-500">Administrator</p>
        </div>
        <button
          (click)="logout()"
          class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
          <mat-icon class="text-sm">logout</mat-icon>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div
    *ngIf="mobileMenuOpen"
    (click)="toggleMobileMenu()"
    class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden">
  </div>

  <!-- Mobile Sidebar -->
  <aside
    [class.translate-x-0]="mobileMenuOpen"
    [class.-translate-x-full]="!mobileMenuOpen"
    class="fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-200 z-50 lg:hidden transition-transform duration-300">
    <!-- Logo -->
    <div class="h-16 flex items-center justify-between border-b border-gray-200 px-4">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
          <mat-icon class="text-white">apartment</mat-icon>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-900">ResiLink</h1>
          <p class="text-xs text-gray-500">Admin Portal</p>
        </div>
      </div>
      <button
        (click)="toggleMobileMenu()"
        class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="px-3 py-4">
      <ul class="space-y-2">
        <li *ngFor="let item of navItems">
          <a
            [routerLink]="item.route"
            (click)="toggleMobileMenu()"
            [class.bg-primary]="isActive(item.route)"
            [class.text-white]="isActive(item.route)"
            [class.text-gray-700]="!isActive(item.route)"
            [class.hover:bg-gray-100]="!isActive(item.route)"
            class="flex items-center gap-3 px-3 py-2 rounded-lg transition-colors">
            <mat-icon>{{ item.icon }}</mat-icon>
            <span class="font-medium">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>
</div>
