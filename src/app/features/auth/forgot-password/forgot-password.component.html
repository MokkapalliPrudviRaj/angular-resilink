<div class="min-h-screen bg-[#f8fafc] flex items-center justify-center px-4 py-12 relative overflow-hidden">
    <!-- Animated background elements (Subtle) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-purple-100/50 rounded-full blur-[120px] animate-blob">
        </div>
        <div
            class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-blue-100/50 rounded-full blur-[120px] animate-blob animation-delay-2000">
        </div>
    </div>

    <!-- Card Container -->
    <div
        class="bg-white w-full max-w-[480px] rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.08)] border border-gray-100 relative z-20 overflow-hidden animate-scale-in p-8 md:p-10">

        <!-- Logo and Brand -->
        <div class="flex items-center gap-3 mb-10 animate-fade-in-up">
            <div
                class="w-12 h-12 bg-[#5048e5] rounded-[14px] flex items-center justify-center shadow-lg shadow-indigo-200">
                <mat-icon class="text-white">apartment</mat-icon>
            </div>
            <h2 class="text-[22px] font-bold text-[#5048e5] tracking-tight">ResiLink</h2>
        </div>

        <!-- Back to Login -->
        <a (click)="goBackToLogin()"
            class="inline-flex items-center gap-2 text-[14px] font-bold text-[#5048e5] hover:text-indigo-700 transition-colors mb-8 cursor-pointer group animate-fade-in-up">
            <mat-icon class="text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</mat-icon>
            Back to Login
        </a>

        <!-- FORM STATE -->
        <div *ngIf="!submitted" class="animate-fade-in-up animation-delay-200">
            <div class="mb-8">
                <h1 class="text-[32px] font-extrabold text-gray-900 leading-tight mb-3">Reset Your Password</h1>
                <p class="text-[15px] text-gray-500 font-medium leading-relaxed">
                    Enter your email address and we'll send you instructions to reset your password.
                </p>
            </div>

            <form [formGroup]="forgotForm" (ngSubmit)="handleSubmit()" class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="block text-[15px] font-bold text-gray-900">Email Address</label>
                    <div class="relative group">
                        <mat-icon
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-[18px] w-[18px] h-[18px]">email</mat-icon>
                        <input type="email" formControlName="email" placeholder="name@example.com"
                            class="w-full h-[58px] pl-12 pr-4 bg-[#f8fafc] border border-[#e2e8f0] rounded-[14px] text-[15px] font-medium text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-[#5048e5] focus:ring-[3px] focus:ring-[#5048e5]/10 transition-all font-inter" />
                    </div>
                    <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
                        class="text-xs text-red-500 mt-1 pl-1">
                        <span *ngIf="forgotForm.get('email')?.hasError('required')">Email is required</span>
                        <span *ngIf="forgotForm.get('email')?.hasError('email')">Invalid email format</span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="forgotForm.invalid || loading"
                    class="w-full h-[58px] bg-[#5048e5] hover:bg-[#4038d5] text-white font-bold text-[16px] rounded-[14px] shadow-lg shadow-indigo-100 flex items-center justify-center gap-3 transition-all hover:translate-y-[-1px] active:translate-y-[1px] disabled:opacity-70 disabled:cursor-not-allowed mt-8 group">
                    {{ loading ? 'Sending...' : 'Send Reset Link' }}
                    <mat-icon *ngIf="!loading"
                        class="text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</mat-icon>
                </button>
            </form>
        </div>

        <!-- SUCCESS STATE -->
        <div *ngIf="submitted" class="text-center animate-scale-in">
            <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <mat-icon class="text-green-600 text-[40px] w-10 h-10">check_circle</mat-icon>
            </div>

            <h1 class="text-[32px] font-extrabold text-gray-900 mb-3">Check Your Email</h1>
            <p class="text-[15px] text-gray-500 font-medium mb-10 leading-relaxed px-4">
                We've sent password reset instructions to <br>
                <strong class="text-gray-900 font-bold block mt-1">{{ email }}</strong>
            </p>

            <div class="space-y-3">
                <button (click)="toggleSubmitted()"
                    class="w-full h-[54px] bg-gray-50 hover:bg-gray-100 text-gray-900 font-bold text-[15px] rounded-[14px] border border-gray-200 transition-all active:scale-[0.98]">
                    Try Another Email
                </button>

                <button (click)="goBackToLogin()"
                    class="w-full h-[54px] bg-[#5048e5] hover:bg-[#4038d5] text-white font-bold text-[15px] rounded-[14px] shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                    Return to Login
                    <mat-icon class="text-[18px]">arrow_forward</mat-icon>
                </button>
            </div>
        </div>
    </div>
</div>
