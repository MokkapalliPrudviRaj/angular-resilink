<!-- CHATGPT STYLE FORGOT PASSWORD MODAL -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 auth-overlay">

  <!-- WELCOME SCREEN BACKGROUND -->
  <app-welcome class="absolute inset-0 z-0 pointer-events-none"></app-welcome>

  <!-- TRANSPARENT BLUR OVERLAY -->
  <div
    class="absolute inset-0
    bg-black/10
    backdrop-blur-[5px]
    backdrop-saturate-150">
  </div>

  <!-- FLOATING MODAL -->
  <div
    class="relative z-20
    w-full max-w-[370px]
    rounded-[24px]
    border border-white/30
    bg-white/85
    backdrop-blur-2xl
    shadow-[0_20px_70px_rgba(0,0,0,0.15)]
    overflow-hidden
    animate-modal">

    <!-- HEADER -->
    <div class="px-5 pt-5 pb-2 flex items-center justify-between">

      <!-- BRAND -->
      <div class="flex items-center gap-2.5">

        <div
          class="w-9 h-9
          bg-[#5048e5]
          rounded-[12px]
          flex items-center justify-center
          shadow-md shadow-indigo-200">

          <mat-icon class="text-white text-[18px]">
            apartment
          </mat-icon>
        </div>

        <h2 class="text-[18px] font-bold text-[#5048e5] tracking-tight">
          ResiLink
        </h2>
      </div>

      <!-- CLOSE -->
      <button
        (click)="goBackToLogin()"
        class="text-gray-400 hover:text-gray-700 transition-colors">

        <mat-icon class="text-[18px]">
          close
        </mat-icon>
      </button>
    </div>

    <!-- BODY -->
    <div class="px-5 pb-5 max-h-form">

      <!-- BACK BUTTON -->
      <button
        (click)="goBackToLogin()"
        class="inline-flex items-center gap-1.5
        text-[12px]
        font-bold
        text-[#5048e5]
        hover:text-indigo-700
        transition-colors
        mb-4
        group">

        <mat-icon
          class="text-[16px]
          group-hover:-translate-x-1
          transition-transform">

          arrow_back
        </mat-icon>

        Back to Login
      </button>

      <!-- FORM STATE -->
      <div *ngIf="!submitted" class="animate-fade-in-up">

        <!-- TITLE -->
        <div class="mb-4">

          <h1 class="text-[22px] font-extrabold text-gray-900 leading-tight mb-1">
            Reset Password
          </h1>

          <p class="text-[12px] text-gray-500 font-medium leading-relaxed">
            Enter your email and we'll send reset instructions.
          </p>
        </div>

        <!-- FORM -->
        <form
          [formGroup]="forgotForm"
          (ngSubmit)="handleSubmit()"
          class="space-y-3">

          <!-- EMAIL -->
          <div class="space-y-1.5">

            <label class="block text-[12px] font-bold text-gray-900">
              Email Address
            </label>

            <div class="relative">

              <mat-icon
                class="absolute left-3 top-1/2 -translate-y-1/2
                text-gray-400
                text-[16px]">

                email
              </mat-icon>

              <input
                type="email"
                formControlName="email"
                placeholder="name@example.com"
                class="w-full h-[42px]
                pl-10 pr-3
                bg-white/70
                border border-[#e2e8f0]
                rounded-[12px]
                text-[13px]
                font-medium
                text-gray-900
                placeholder:text-gray-400
                focus:outline-none
                focus:border-[#5048e5]
                focus:ring-[3px]
                focus:ring-[#5048e5]/10" />
            </div>

            <!-- VALIDATION -->
            <div
              *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
              class="text-[11px] text-red-500 pl-1">

              <span *ngIf="forgotForm.get('email')?.hasError('required')">
                Email is required
              </span>

              <span *ngIf="forgotForm.get('email')?.hasError('email')">
                Invalid email format
              </span>
            </div>
          </div>

          <!-- SUBMIT -->
          <button
            type="submit"
            [disabled]="forgotForm.invalid || loading"
            class="w-full h-[42px]
            bg-[#5048e5]
            hover:bg-[#4338ca]
            text-white
            font-bold
            text-[13px]
            rounded-[12px]
            shadow-md shadow-indigo-200
            flex items-center justify-center gap-1.5
            mt-4">

            {{ loading ? 'Sending...' : 'Send Reset Link' }}

            <mat-icon *ngIf="!loading" class="text-[16px]">
              arrow_forward
            </mat-icon>
          </button>
        </form>
      </div>

      <!-- SUCCESS STATE -->
      <div
        *ngIf="submitted"
        class="text-center animate-scale-in py-2">

        <!-- SUCCESS ICON -->
        <div
          class="w-16 h-16
          bg-green-50
          rounded-full
          flex items-center justify-center
          mx-auto mb-4">

          <mat-icon class="text-green-600 text-[32px]">
            check_circle
          </mat-icon>
        </div>

        <!-- TITLE -->
        <h1 class="text-[22px] font-extrabold text-gray-900 mb-2">
          Check Your Email
        </h1>

        <!-- MESSAGE -->
        <p class="text-[12px] text-gray-500 font-medium leading-relaxed mb-6">

          We've sent reset instructions to

          <strong class="text-gray-900 block mt-1 font-bold">
            {{ email }}
          </strong>
        </p>

        <!-- ACTIONS -->
        <div class="space-y-2">

          <!-- TRY AGAIN -->
          <button
            (click)="toggleSubmitted()"
            class="w-full h-[42px]
            bg-gray-50
            hover:bg-gray-100
            text-gray-900
            font-bold
            text-[13px]
            rounded-[12px]
            border border-gray-200">

            Try Another Email
          </button>

          <!-- LOGIN -->
          <button
            (click)="goBackToLogin()"
            class="w-full h-[42px]
            bg-[#5048e5]
            hover:bg-[#4338ca]
            text-white
            font-bold
            text-[13px]
            rounded-[12px]
            shadow-md shadow-indigo-200
            flex items-center justify-center gap-1.5">

            Return to Login

            <mat-icon class="text-[16px]">
              arrow_forward
            </mat-icon>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
